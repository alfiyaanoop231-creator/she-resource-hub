<!DOCTYPE html>
<html>
<head>
    <title>Safe Space</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Safe Space 💜</h1>

<!-- LOGIN SECTION -->
<div class="login-box" id="loginBox">
    <h2>Login</h2>

    <select id="role">
        <option value="">Select Role</option>
        <option value="Student">Student</option>
        <option value="Worker">Worker</option>
    </select>

    <input type="text" id="username" placeholder="Enter your name">
    <button onclick="login()">Login</button>

    <p id="loginMessage"></p>
</div>

<!-- MAIN WEBSITE (Hidden Before Login) -->
<div id="mainContent" style="display:none;">

    <button onclick="toggleMode()" class="mode-btn">🌙 Toggle Mode</button>

    <input type="text" id="search" placeholder="Search topics..." onkeyup="searchContent()">

    <div id="content">

        <div class="card">
            <h2>PCOS</h2>
            <p>Polycystic Ovary Syndrome is a hormonal health condition.</p>
        </div>

        <div class="card">
            <h2>Mental Health</h2>
            <p>Taking care of emotional well-being is important.</p>
        </div>

        <div class="card">
            <h2>Self Defense</h2>
            <p>Always stay aware and prepared for emergencies.</p>
        </div>

    </div>

    <div class="emergency">
        <h2>Emergency Contacts</h2>
        <a href="tel:112" class="call-btn">📞 Call 112</a>
        <a href="tel:1091" class="call-btn">📞 Women Helpline 1091</a>
    </div>

    <div class="contact">
        <h2>Contact Support</h2>
        <input type="text" id="name" placeholder="Your Name">
        <textarea id="message" placeholder="Your Message"></textarea>
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
